<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Selecionar empresa | EzStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
  <div class="card login-card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <h2 class="fw-bold mb-2 text-center">Escolha a empresa</h2>
      <p class="text-muted text-center">Selecione qual empresa deseja administrar nesta sessão.</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-grid gap-3 mt-4">
          {% for vinculo in vinculos %}
          <button class="btn btn-outline-primary text-start p-3" name="empresa_id" value="{{ vinculo.empresa.id }}">
            <strong>{{ vinculo.empresa.nome_fantasia|default:vinculo.empresa.nome }}</strong><br>
            <span class="text-muted small">Perfil: {{ vinculo.get_perfil_display }}</span>
            {% if vinculo.empresa.assinatura %}<span class="badge text-bg-light ms-2">{{ vinculo.empresa.assinatura.plano.nome }}</span>{% endif %}
          </button>
          {% empty %}
          <div class="alert alert-warning">Seu usuário ainda não está vinculado a nenhuma empresa. <a href="/comecar/" class="alert-link">Criar uma empresa agora</a>.</div>
          {% endfor %}
        </div>
      </form>
    </div>
  </div>
</body>
</html>
