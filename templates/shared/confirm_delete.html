{% extends "base.html" %}
{% block title %}{{ title }} | EzStock{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card soft-card border-0 shadow-sm">
  <div class="card-body p-4">
    <h5 class="mb-3">Confirmação</h5>
    <p class="text-muted mb-4">{{ message }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button class="btn btn-danger">Confirmar exclusão</button>
        {% if cancel_kwargs %}
          <a href="{% url cancel_url pk=cancel_kwargs.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        {% else %}
          <a href="{% url cancel_url %}" class="btn btn-outline-secondary">Cancelar</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
