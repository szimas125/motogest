<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar senha | EzStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="mb-3">Recuperar senha</h2>
            <p class="text-muted">Informe seu e-mail para receber as instruções de redefinição.</p>
            <form method="post">{% csrf_token %}
              {{ form.as_p }}
              <div class="d-flex gap-2">
                <button class="btn btn-primary">Enviar instruções</button>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary">Voltar</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
