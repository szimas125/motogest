<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Nova senha | EzStock</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-5"><div class="row justify-content-center"><div class="col-lg-5"><div class="card shadow-sm border-0"><div class="card-body p-4"><h2 class="mb-3">Definir nova senha</h2>{% if validlink %}<form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Salvar nova senha</button></form>{% else %}<p class="text-danger mb-0">O link não é mais válido. Solicite uma nova redefinição.</p>{% endif %}</div></div></div></div></div></body></html>
